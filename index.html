<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEP</title>
     <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./style.css">

</head>
<body>
    <header>
    <div class="container header-container">

        <a href="#" class="logo">
            <img src="./assets/images/logo.svg" alt="E-Commerce">
        </a>

        <nav>
            <ul class="menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Sobre nós</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>

        <a href="#" class="btn-login">Login</a>
    </div>
</header>
<main>
    <div class="container main-container">

        <div class="product-image">
            <img src="./assets/images/Product.svg" alt="MacBook">
        </div>

        <div class="product-info">

            <div class="rating">
                ★★★★★
                <span>5.0 Estrelas</span>
                <small>(21.671 avaliações)</small>
            </div>

            <h2>
              2020 Apple MacBook Pro with Apple M1 Chip (13-inch, 8GB RAM, 256GB SSD Storage) - Space Gray
            </h2>

            <div class="preco">
                <h3>R$5.299,00</h3>

                <div class="preco">
                    <span class="menor_preço">R$7.000,00</span>
                    <span class="desconto">24,3% OFF</span>
                </div>
            </div>

            <div class="colors">

                <p>Cor</p>

                <img src="./assets/images/Frame 9.png" alt="colors">

            </div>

            <button class="btn-buy">
                Adicionar no carrinho
            </button>

        </div>

    </div>
</main>
</body>
</html>
